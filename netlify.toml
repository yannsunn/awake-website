[build]
  publish = "dist"
  command = "echo 'Static site, no build needed'"

[build.environment]
  NODE_VERSION = "16"
  PYTHON_VERSION = "3.8"

[dev]
  framework = "#static"

# SPAルーティング（シンプル化）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 成功ページリダイレクト
[[redirects]]
  from = "/success"
  to = "/thanks.html"
  status = 302

[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200

# セキュリティヘッダー設定
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com;
      img-src 'self' data: https://*.cloudflare.com https://*.githubusercontent.com;
      font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
      connect-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com;
      worker-src 'self' blob:;
      frame-src 'self';
      media-src 'self';
      object-src 'none';
      """

# 静的アセットのキャッシュ設定
[[headers]]
  for = "/**/*.{css,js,svg,jpg,jpeg,png,gif,ico,woff,woff2}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" 