<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="株式会社Awakeは、ネット通販、AI事業、保険紹介で、お客様のビジネスの成長をサポートします。">
    <meta name="keywords" content="ネット通販, AI事業, 保険紹介, ウェブサイト制作, EC販売">
    <meta name="author" content="株式会社Awake">
    
    <!-- OGP設定 -->
    <meta property="og:title" content="株式会社Awake - ビジネスの新たな可能性を開く">
    <meta property="og:description" content="株式会社Awakeは、ネット通販、AI事業、保険紹介で、お客様のビジネスの成長をサポートします。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://awakeinc.co.jp">
    <meta property="og:image" content="public/assets/images/ogp.jpg">
    <meta property="og:site_name" content="株式会社Awake">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="株式会社Awake - ビジネスの新たな可能性を開く">
    <meta name="twitter:description" content="株式会社Awakeは、ネット通販、AI事業、保険紹介で、お客様のビジネスの成長をサポートします。">
    <meta name="twitter:image" content="public/assets/images/ogp.jpg">
    
    <title>株式会社Awake | 革新的なビジネスソリューション</title>
    
    <!-- クリティカルCSS（インライン） -->
    <style>
        /* ページ読み込み中の基本スタイル */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Helvetica Neue',Arial,sans-serif;line-height:1.6;color:#374151;background-color:#f9f9f9;overflow-x:hidden;}
        .loading{position:fixed;top:0;left:0;width:100%;height:100%;background-color:#fff;display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity 0.5s ease-out;}
        .loading.hide{opacity:0;pointer-events:none;}
        .loading-spinner{width:50px;height:50px;border:5px solid rgba(30,136,229,0.2);border-radius:50%;border-top-color:#1E88E5;animation:spin 1s ease-in-out infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
    
    <!-- CSS -->
    <link rel="stylesheet" href="src/styles/index.css">
    
    <!-- ファビコン -->
    <link rel="icon" href="public/assets/favicon.ico">
    <link rel="apple-touch-icon" href="public/assets/apple-touch-icon.png">
    <link rel="manifest" href="public/assets/site.webmanifest">
    
    <!-- フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- パフォーマンス最適化 -->
    <meta http-equiv="x-dns-prefetch-control" content="on">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    
    <!-- プリロード重要リソース -->
    <link rel="preload" href="/src/styles/index.css" as="style">
    <link rel="preload" href="/src/js/main.js" as="script">
    <link rel="preload" href="/logo.svg" as="image" type="image/svg+xml">
</head>
<body>
    <!-- ローディングインジケーター -->
    <div class="loading">
        <div class="loading-spinner"></div>
    </div>
    
    <!-- メインコンテンツ -->
    <div id="root"></div>
    
    <!-- スクロールトップボタン -->
    <button class="scroll-top" aria-label="トップへスクロール">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>
    
    <!-- JavaScript -->
    <script type="module" src="src/index.jsx"></script>
    
    <!-- ローディング処理 -->
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.querySelector('.loading').classList.add('hide');
            }, 500);
        });
    </script>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
    </script>
</body>
</html>
